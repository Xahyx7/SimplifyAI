<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SimplifyAI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 🎬 INTRO -->
  <div id="intro">
    <video id="introVideo" autoplay muted playsinline>
      <source src="/assets/intro.mp4" type="video/mp4">
    </video>
  </div>

  <!-- 🌐 MAIN UI -->
  <div id="mainUI">

    <!-- Background glow -->
    <div class="bg-glow"></div>

    <!-- Main glass card -->
    <div class="card" id="card">
      <h1>SimplifyAI</h1>
      <p>Upload your doubt and get instant explanation</p>

      <input type="file" class="input" />
      <button class="btn">Solve</button>
    </div>

    <!-- Output section -->
    <div class="output">

      <div class="glass answer">🧠 Answer will appear here</div>

      <div class="glass concept">📌 Concept will appear here</div>

      <div class="glass videos">🎥 Videos will appear here</div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
