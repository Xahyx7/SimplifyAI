<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SimplifyAI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <video id="introVideo" autoplay muted playsinline>
    <source src="/assets/intro.mp4" type="video/mp4">
  </video>
</div>

<!-- 🔐 AUTH SCREEN -->
<div id="auth" class="auth-screen">
  <div class="auth-box">
    <h2>SimplifyAI</h2>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- MAIN -->
<div id="mainUI" style="display:none;">

  <div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h2>SimplifyAI</h2>
      <p>AI Tutor</p>

      <button onclick="newChat()">➕ Ask Doubt</button>

      <h4>📜 History</h4>
      <div id="historyList"></div>
    </aside>

    <!-- CHAT AREA -->
    <main class="chat">

      <!-- CHAT MESSAGES -->
      <div class="chat-container" id="chatContainer"></div>

      <!-- CHAT BAR -->
      <div class="chat-bar">

        <!-- Upload -->
        <label for="imageInput" class="file-btn">📷</label>
        <input type="file" id="imageInput">

        <!-- Preview -->
        <img id="preview" class="preview" />

        <!-- Input -->
        <input 
          type="text" 
          id="promptInput" 
          placeholder="Ask anything..."
        >

        <!-- Voice -->
        <button onclick="startVoice()">🎙️</button>

        <!-- Send -->
        <button onclick="sendMessage()">Solve</button>

      </div>

    </main>

    <!-- VIDEO PANEL -->
    <aside class="panel" id="videoPanel">
      <h3>🎥 Videos</h3>
    </aside>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
