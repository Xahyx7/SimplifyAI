<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SimplifyAI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- INTRO -->
  <div id="intro">
    <video id="introVideo" autoplay muted playsinline>
      <source src="/assets/intro.mp4" type="video/mp4">
    </video>
  </div>

  <!-- MAIN UI -->
  <div id="mainUI">

    <div class="bg-glow"></div>

    <div class="layout">

      <!-- SIDEBAR -->
      <div class="sidebar">
        <h2>SimplifyAI</h2>
        <p>AI Study Assistant</p>
      </div>

      <!-- CENTER -->
      <div class="center">
        <div class="card" id="card">
          <h3>Upload your doubt</h3>
          <input type="file" class="input" />
          <button class="btn">Solve</button>
        </div>
      </div>

      <!-- RIGHT PANEL -->
      <div class="right">

        <div class="glass">🧠 Answer will appear here</div>

        <div class="glass">📌 Concept breakdown</div>

        <div class="glass">🎥 Related videos</div>

      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
