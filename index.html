<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SimplifyAI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <video id="introVideo" autoplay muted playsinline>
    <source src="/assets/intro.mp4" type="video/mp4">
  </video>
</div>

<!-- MAIN -->
<div id="mainUI">

  <div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h2>SimplifyAI</h2>
      <p>AI Tutor</p>
    </aside>

    <!-- CHAT AREA -->
    <main class="chat">

      <!-- CHAT MESSAGES -->
      <div class="chat-container" id="chatContainer"></div>

      <!-- 🔥 PREMIUM CHAT BAR -->
      <div class="chat-bar">

  <!-- Upload -->
  <label for="imageInput" class="file-btn">📷</label>
  <input type="file" id="imageInput">

  <!-- Image Preview -->
  <img id="preview" class="preview" />

  <!-- Input -->
  <input 
    type="text" 
    id="promptInput" 
    placeholder="Ask anything..."
  >

  <!-- Voice -->
  <button onclick="startVoice()">🎙️</button>

  <!-- Send -->
  <button onclick="sendMessage()">Solve</button>

</div>
    </main>

    <!-- VIDEO PANEL -->
    <aside class="panel" id="videoPanel">
      <h3>🎥 Videos</h3>
    </aside>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
