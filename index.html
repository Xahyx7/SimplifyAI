<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SimplifyAI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <video id="introVideo" autoplay muted playsinline>
    <source src="/assets/intro.mp4" type="video/mp4">
  </video>
</div>

<!-- MAIN -->
<div id="mainUI">

  <div class="bg-glow"></div>

  <div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h2>SimplifyAI</h2>
      <p>AI Study Assistant</p>
    </aside>

    <!-- MAIN CONTENT -->
   <main class="main">

  <!-- Upload Card -->
  <div class="card" id="card">
    <h3>Upload your doubt</h3>

    <input type="file" id="imageInput" />

    <button onclick="solve()">Solve</button>
  </div>

  <!-- 💬 CHAT INPUT BAR -->
  <div class="chat-bar">
    <input 
      type="text" 
      id="promptInput" 
      placeholder="Explain what you want... (e.g. only steps, hint, easy explanation)"
    />
    <button onclick="solve()">➤</button>
  </div>

</main>
    <!-- OUTPUT PANEL -->
    <aside class="panel">

      <div class="glass" id="answer">🧠 Waiting for answer...</div>
      <div class="glass">📌 Concept will appear</div>
      <div class="glass" id="videos">🎥 Videos will appear</div>

    </aside>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
